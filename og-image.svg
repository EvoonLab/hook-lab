<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="og" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff6b35"/>
      <stop offset="100%" stop-color="#e8930c"/>
    </linearGradient>
    <radialGradient id="glow1" cx="30%" cy="30%" r="50%">
      <stop offset="0%" stop-color="rgba(255,107,53,0.15)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <radialGradient id="glow2" cx="70%" cy="70%" r="50%">
      <stop offset="0%" stop-color="rgba(232,147,12,0.1)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="#0a0a0f"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  <!-- Top accent line -->
  <rect x="200" y="0" width="800" height="3" rx="1.5" fill="url(#og)" opacity="0.8"/>
  <!-- HC Logo Mark (centered, large) -->
  <g transform="translate(500, 140) scale(2.5)">
    <path d="M8 8v28M8 22h12M20 8v28" stroke="url(#og)" stroke-width="4" stroke-linecap="round" fill="none"/>
    <path d="M32 8c0 0-8 0-8 8s8 8 8 8" stroke="url(#og)" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    <circle cx="32" cy="26" r="2.5" fill="url(#og)"/>
  </g>
  <!-- HOOKA Text -->
  <text x="600" y="380" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="72" font-weight="900" fill="url(#og)" letter-spacing="-2">HOOKA</text>
  <!-- Tagline -->
  <text x="600" y="430" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="22" fill="#8b8ba0" letter-spacing="1">La tua palestra creativa per hook che spaccano</text>
  <!-- Feature badges -->
  <g transform="translate(300, 480)">
    <rect x="0" y="0" width="130" height="32" rx="16" fill="rgba(255,107,53,0.12)" stroke="rgba(255,107,53,0.3)" stroke-width="1"/>
    <text x="65" y="21" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" fill="#ff6b35" font-weight="600">Giochi AI</text>
  </g>
  <g transform="translate(450, 480)">
    <rect x="0" y="0" width="130" height="32" rx="16" fill="rgba(232,147,12,0.12)" stroke="rgba(232,147,12,0.3)" stroke-width="1"/>
    <text x="65" y="21" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" fill="#e8930c" font-weight="600">Script Studio</text>
  </g>
  <g transform="translate(600, 480)">
    <rect x="0" y="0" width="150" height="32" rx="16" fill="rgba(168,85,247,0.12)" stroke="rgba(168,85,247,0.3)" stroke-width="1"/>
    <text x="75" y="21" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" fill="#a855f7" font-weight="600">Story Planner</text>
  </g>
  <g transform="translate(770, 480)">
    <rect x="0" y="0" width="130" height="32" rx="16" fill="rgba(6,182,212,0.12)" stroke="rgba(6,182,212,0.3)" stroke-width="1"/>
    <text x="65" y="21" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="13" fill="#06b6d4" font-weight="600">Workshop</text>
  </g>
  <!-- DSS Edition badge -->
  <rect x="520" y="540" width="160" height="28" rx="14" fill="rgba(255,107,53,0.08)" stroke="rgba(255,107,53,0.2)" stroke-width="1"/>
  <text x="600" y="559" text-anchor="middle" font-family="'Segoe UI',system-ui,sans-serif" font-size="11" fill="#ff6b35" font-weight="700" letter-spacing="2">DSS EDITION</text>
</svg>
